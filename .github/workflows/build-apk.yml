name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 26.1.10909125

      - name: Download Piper Android binary
        run: |
          curl -L --header "Accept: application/octet-stream" \
               -o piper.tar.gz \
               https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_android_arm64-v8a.tar.gz
          tar -xzf piper.tar.gz
          mkdir -p app/src/main/assets
          mv piper/piper app/src/main/assets/piper
          chmod +x app/src/main/assets/piper

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk