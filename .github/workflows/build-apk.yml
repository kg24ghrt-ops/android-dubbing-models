name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 26.1.10909125

      - name: Create assets directory
        run: mkdir -p app/src/main/assets

      - name: Download Piper Android binary
        uses: robinraju/release-downloader@v1.10
        with:
          repository: "rhasspy/piper"
          tag: "2023.11.14-2"
          fileName: "piper_android_arm64-v8a.tar.gz"
          out-file-path: "temp"
          extract: true

      - name: Move Piper binary to assets
        run: |
          mkdir -p app/src/main/assets
          mv temp/piper/piper app/src/main/assets/piper
          chmod +x app/src/main/assets/piper

      - name: Verify Piper binary
        run: ls -lh app/src/main/assets/piper

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk